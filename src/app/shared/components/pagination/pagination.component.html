@if (totalPages() > 1) {
  <nav class="flex items-center justify-center gap-1" aria-label="Pagination">

    <!-- Previous -->
    <button
      type="button"
      (click)="goTo(currentPage() - 1)"
      [disabled]="currentPage() === 0"
      class="flex h-8 w-8 items-center justify-center rounded-md text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-100 hover:text-gray-900 disabled:pointer-events-none disabled:opacity-40 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--french-violet)]"
      aria-label="Previous page"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
      </svg>
    </button>

    <!-- Page numbers -->
    @for (page of pages(); track $index) {
      @if (page === null) {
        <span class="flex h-8 w-8 items-center justify-center text-sm text-gray-400 dark:text-gray-500" aria-hidden="true">
          &hellip;
        </span>
      } @else {
        <button
          type="button"
          (click)="goTo(page)"
          [attr.aria-current]="page === currentPage() ? 'page' : null"
          class="flex h-8 w-8 items-center justify-center rounded-md text-sm font-medium transition-colors duration-150 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--french-violet)]"
          [class]="page === currentPage()
            ? 'bg-[var(--french-violet)] text-white'
            : 'text-gray-600 hover:bg-gray-100 hover:text-gray-900 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white'"
        >
          {{ page + 1 }}
        </button>
      }
    }

    <!-- Next -->
    <button
      type="button"
      (click)="goTo(currentPage() + 1)"
      [disabled]="currentPage() === totalPages() - 1"
      class="flex h-8 w-8 items-center justify-center rounded-md text-sm text-gray-500 transition-colors duration-150 hover:bg-gray-100 hover:text-gray-900 disabled:pointer-events-none disabled:opacity-40 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--french-violet)]"
      aria-label="Next page"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
      </svg>
    </button>

  </nav>
}
