<a
  [routerLink]="['/movies', movie().id]"
  class="group flex flex-col overflow-hidden rounded-lg border border-gray-200 bg-white transition-shadow duration-200 hover:shadow-md dark:border-white/[0.07] dark:bg-white/[0.04] dark:hover:shadow-black/30 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--french-violet)]"
>
  <!-- Poster -->
  <div class="aspect-[2/3] w-full overflow-hidden bg-gray-100 dark:bg-white/[0.06]">
    @if (movie().posterUrl) {
      <img
        [src]="movie().posterUrl"
        [alt]="movie().title"
        class="h-full w-full object-cover transition-transform duration-300 group-hover:scale-105"
        loading="lazy"
      />
    } @else {
      <div class="flex h-full w-full items-center justify-center p-4">
        <span class="text-center text-sm font-medium text-gray-400 dark:text-gray-500 line-clamp-4">
          {{ movie().title }}
        </span>
      </div>
    }
  </div>

  <!-- Info -->
  <div class="flex flex-1 flex-col gap-1 p-3">
    <p class="line-clamp-2 text-sm font-semibold leading-snug text-gray-900 dark:text-white">
      {{ movie().title }}
    </p>

    @if (movie().genres.length > 0) {
      <p class="truncate text-xs text-gray-500 dark:text-gray-400">
        {{ genreLabel(movie().genres) }}
      </p>
    }

    <div class="mt-auto flex items-center justify-between pt-1">
      <!-- Rating -->
      <span class="flex items-center gap-1 text-xs font-medium text-[var(--french-violet)] dark:text-[var(--bright-blue)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 fill-current" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
        </svg>
        {{ formattedRating(movie().averageRating) }}
      </span>

      <!-- Release year -->
      <span class="text-xs text-gray-400 dark:text-gray-500">
        {{ movie().releaseYear }}
      </span>
    </div>
  </div>
</a>
