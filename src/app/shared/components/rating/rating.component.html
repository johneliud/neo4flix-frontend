<div class="flex items-center gap-1" aria-label="Rate this movie">
  @for (star of stars; track star) {
    <button
      type="button"
      [attr.aria-label]="'Rate ' + star + ' star' + (star === 1 ? '' : 's')"
      [disabled]="isLoading()"
      (click)="onStar(star)"
      (mouseenter)="hovered.set(star)"
      (mouseleave)="hovered.set(null)"
      class="transition-transform duration-100 hover:scale-110 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-[var(--french-violet)] rounded disabled:cursor-not-allowed disabled:opacity-50"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        class="h-6 w-6 transition-colors duration-100"
        viewBox="0 0 24 24"
        aria-hidden="true"
        [ngClass]="star <= activeScore()
          ? 'fill-[var(--french-violet)] dark:fill-[var(--bright-blue)]'
          : 'fill-gray-200 dark:fill-white/20'"
      >
        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />
      </svg>
    </button>
  }

  <span class="ml-1 text-xs text-gray-400 dark:text-gray-500">
    @if (userRating()) {
      Your rating: {{ userRating()!.score }}/5 &middot; <span class="cursor-pointer hover:text-gray-600 dark:hover:text-gray-300">click same star to remove</span>
    } @else {
      Rate this movie
    }
  </span>
</div>
